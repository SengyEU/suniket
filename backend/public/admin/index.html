<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suniket Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#252525;--surface3:#333;--text:#e0e0e0;--text2:#999;--accent:#e63946;--accent-hover:#c1121f;--border:#333;--radius:8px;--sidebar:240px}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:400px}
.login-box h1{font-size:24px;margin-bottom:4px;color:var(--accent)}
.login-box p{font-size:14px;color:var(--text2);margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px}
.login-box button:hover{background:var(--accent-hover)}
.login-box .error{color:var(--accent);font-size:13px;margin-top:12px;display:none}

/* App layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto}
.sidebar h2{padding:0 20px;font-size:18px;margin-bottom:20px}
.sidebar h2 a{color:var(--accent);text-decoration:none}
.sidebar nav a{display:block;padding:10px 20px;color:var(--text2);text-decoration:none;font-size:14px;font-weight:500;transition:.15s}
.sidebar nav a:hover,.sidebar nav a.active{color:var(--text);background:var(--surface2)}
.sidebar nav a .icon{display:inline-block;width:20px;margin-right:8px}
.sidebar .logout{position:absolute;bottom:20px;left:20px;right:20px;padding:10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:13px;text-align:center}
.sidebar .logout:hover{border-color:var(--accent);color:var(--accent)}
.main{margin-left:var(--sidebar);flex:1;padding:32px;max-width:1200px}
.main h1{font-size:28px;margin-bottom:24px}

/* Cards */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.stat-card .num{font-size:32px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:13px;color:var(--text2);margin-top:4px}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-wrap .toolbar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-wrap .toolbar h2{font-size:16px;margin:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-edit{background:var(--surface3);color:var(--text)}
.btn-edit:hover{background:#444}
.btn-del{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-del:hover{background:var(--accent);color:#fff}
.btn-icon{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px 8px;font-size:14px}
.btn-icon:hover{color:var(--accent)}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:12px 16px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text2);letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--surface2)}
td.actions{white-space:nowrap;text-align:right}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:80vh;overflow-y:auto;padding:28px}
.modal h2{font-size:20px;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:80px;resize:vertical;font-family:inherit}
.form-group .hint{font-size:11px;color:var(--text2);margin-top:4px}
.form-group.checkbox{display:flex;align-items:center;gap:8px}
.form-group.checkbox label{margin:0}
.form-group.checkbox input[type=checkbox]{width:auto}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:24px}
.btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-cancel:hover{background:var(--surface3)}

/* Albums nested */
.song-list{margin:8px 0 8px 20px;padding:0;list-style:none}
.song-list li{padding:6px 8px;font-size:13px;border-left:2px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.song-list li:hover{border-left-color:var(--accent)}
.song-list li .mini-actions{display:flex;gap:4px}
.lyrics-preview{font-size:12px;color:var(--text2);margin-top:4px;white-space:pre-wrap;max-height:60px;overflow:hidden}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;font-size:14px;z-index:200;opacity:0;transform:translateY(20px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:#2d6a4f}
.toast.error{border-color:var(--accent)}

.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}
@media(max-width:768px){.sidebar{width:60px;padding:12px 0}.sidebar h2,.sidebar nav a span,.sidebar .logout{display:none}.sidebar nav a{padding:12px;text-align:center}.sidebar nav a .icon{margin:0}.main{margin-left:60px;padding:16px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal" class="modal-overlay"><div class="modal" id="modalContent"></div></div>
<div id="toast" class="toast"></div>
<script src="app.js"></script>
</body>
</html>
